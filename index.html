<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>متجر الألعاب الاحترافي</title>
    <style>
        :root {
            --bg-color: #0b0b0b;   /* خلفية سوداء فخمة */
            --card-bg: #1a1a1a;    /* خلفية الكروت (أغمق) */
            --main-yellow: #ffcc00; /* أصفر الموقع الأساسي */
            --text-color: #ffffff;
            --sub-text: #b0b0b0;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* --- تصميم الترويسة (Header) --- */
        .header {
            width: 100%;
            height: 300px;
            background-color: transparent;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background-image: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.8)), url(' Project Community.png'); /* ترويسة الموقع مع خلفية غامقة */
            background-size: cover;
            background-position: center;
            border-bottom: 2px solid var(--main-yellow);
        }

        .header h1 {
            color: var(--main-yellow);
            text-transform: uppercase;
            font-size: 2.5rem;
            text-shadow: 0 0 15px rgba(255, 204, 0, 0.4);
        }

        /* --- زر العودة (معدل) --- */
        .back-btn {
            background-color: #2a2a2a;
            color: var(--text-color);
            border: 1px solid #444;
            padding: 8px 15px;
            border-radius: 5px;
            cursor: pointer;
            margin-top: 15px;
            transition: background 0.3s;
        }
        .back-btn:hover { background-color: #444; }

        /* --- حاوية المنتجات --- */
        .container {
            width: 100%;
            max-width: 1200px;
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
            padding: 50px 20px;
        }

        /* --- تصميم الكرت الأساسي --- */
        .card {
            background-color: var(--card-bg);
            border-radius: 20px;
            width: 250px;
            padding: 20px;
            text-align: center;
            border: 1px solid transparent;
            transition: all 0.3s;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }

        .card:hover {
            transform: translateY(-5px);
            border-color: var(--main-yellow);
            box-shadow: 0 10px 25px rgba(255, 204, 0, 0.2);
        }

        /* تصميم قسم الصورة (الجديد) */
        .image-placeholder {
            width: 100%;
            height: 150px;
            background-color: #2a2a2a; /* لون مؤقت أغمق قليلاً من الكرت */
            border-radius: 10px;
            margin-bottom: 15px;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #555; /* لون نص مؤقت */
            font-size: 0.9rem;
            overflow: hidden; /* لقص أي شيء يخرج عن الإطار */
        }
        .image-placeholder img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain; /* لضمان ظهور الصورة بالكامل دون تشويه */
        }

        .card h2 {
            font-size: 1.2rem;
            color: var(--text-color);
            margin: 10px 0;
        }

        .price {
            font-size: 1.8rem;
            font-weight: bold;
            color: var(--main-yellow);
            margin-bottom: 20px;
        }

        /* --- تصميم زر الإضافة للسلة --- */
        .add-btn {
            background-color: var(--main-yellow);
            color: #000;
            border: none;
            padding: 10px;
            border-radius: 10px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            transition: all 0.3s;
        }
        .add-btn:hover { background-color: #ffffff; transform: scale(1.05); }

        /* --- نظام سلة المشتريات (الجديد) --- */
        .cart-toggle {
            position: fixed;
            bottom: 20px;
            left: 20px; /* في الجهة اليسرى كما في الصورة */
            background-color: var(--main-yellow);
            color: #000;
            border: none;
            padding: 12px 20px;
            border-radius: 30px;
            font-weight: bold;
            cursor: pointer;
            z-index: 1000;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
            transition: transform 0.3s;
        }
        .cart-toggle:hover { transform: scale(1.1); }

    </style>
</head>
<body>

    <div class="header">
        <h1>مرحباً بكم في المتجر</h1>
        <button class="back-btn">← العودة للرئيسية</button>
    </div>

    <div class="container">
        <div class="card">
            <div class="image-placeholder">
                <img src="Dragon Cannelloni.jpg" alt="Dragon Cannelloni">
            </div>
            <h2>Dragon Cannelloni</h2>
            <p class="price">$60</p>
            <button class="add-btn" onclick="addToCart('Dragon Cannelloni', 60)">أضف للسلة</button>
        </div>

        <div class="card">
            <div class="image-placeholder">
                <img src="https://via.placeholder.com/200x150?text=Skibidi+Toilet" alt="Skibidi Toilet">
            </div>
            <h2>Skibidi Toilet</h2>
            <p class="price">$300</p>
            <button class="add-btn" onclick="addToCart('Skibidi Toilet', 300)">أضف للسلة</button>
        </div>

        <div class="card">
            <div class="icon-circle">🐱</div> <h2>Meowl</h2>
            <p class="price">$400</p>
            <button class="add-btn" onclick="addToCart('Meowl', 400)">أضف للسلة</button>
        </div>

        <div class="card">
            <div class="image-placeholder">
                <img src="https://via.placeholder.com/200x150?text=Strawberry+Elephant" alt="Strawberry Elephant">
            </div>
            <h2>Strawberry Elephant</h2>
            <p class="price">$500</p>
            <button class="add-btn" onclick="addToCart('Strawberry Elephant', 500)">أضف للسلة</button>
        </div>
    </div>

    <button class="cart-toggle" onclick="toggleCart()">🛒 السلة: <span id="cart-count">0</span> غرض</button>

    <script>
        // مصفوفة لتخزين عناصر السلة
        let cartItems = [];

        // دالة لإضافة عنصر للسلة
        function addToCart(itemName, itemPrice) {
            cartItems.push({ name: itemName, price: itemPrice });
            updateCartCount();
            alert("تم إضافة " + itemName + " للسلة بنجاح!");
        }

        // دالة لتحديث عدد العناصر في زر السلة
        function updateCartCount() {
            document.getElementById('cart-count').innerText = cartItems.length;
        }

        // دالة لعرض محتويات السلة (مؤقتة، يمكن تطويرها لصفحة سلة كاملة)
        function toggleCart() {
            if (cartItems.length === 0) {
                alert("السلة فارغة!");
                return;
            }

            let cartContent = "محتويات السلة:\n";
            let totalPrice = 0;
            cartItems.forEach(item => {
                cartContent += "- " + item.name + ": $" + item.price + "\n";
                totalPrice += item.price;
            });
            cartContent += "\nالمجموع الكلي: $" + totalPrice;

            alert(cartContent);
        }
    </script>

</body>
</html>
