<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>متجرنا يقدم لكم | Brainrot Items</title>
    <style>
        body { background: #050505; color: white; font-family: 'Segoe UI', sans-serif; margin: 0; overflow-x: hidden; }
        
        /* الهيدر */
        .header {
            padding: 20px 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(0,0,0,0.9);
            border-bottom: 2px solid #ffcc00;
            position: sticky;
            top: 0;
            z-index: 1000;
            backdrop-filter: blur(10px);
        }

        .cart-icon-btn {
            background: #ffcc00; color: #000; padding: 10px 20px;
            border-radius: 12px; font-weight: bold; cursor: pointer; border: none;
            box-shadow: 0 0 15px rgba(255, 204, 0, 0.3); transition: 0.3s;
        }
        .cart-icon-btn:hover { transform: scale(1.1); box-shadow: 0 0 25px #ffcc00; }

        /* شبكة المنتجات */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
            gap: 40px;
            padding: 60px 10%;
        }

        /* الكرت الذكي والملمع */
        .card {
            background: #111;
            border: 1px solid #222;
            border-radius: 25px;
            padding: 25px;
            text-align: center;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
            overflow: hidden;
        }

        /* تأثير التكبير واللمعة عند مرور الماوس */
        .card:hover {
            transform: scale(1.08); /* يكبر الكرت */
            border-color: #ffcc00;
            box-shadow: 0 0 40px rgba(255, 204, 0, 0.25); /* توهج ذهبي */
        }

        /* حركة للصورة داخل الكرت */
        .img-box {
            height: 180px;
            background: radial-gradient(circle, #1a1a1a 0%, #000 100%);
            border-radius: 20px;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.3s;
        }
        
        .card:hover .img-box img {
            transform: scale(1.15) rotate(5deg); /* الصورة تكبر وتدور قليلاً */
            filter: drop-shadow(0 0 15px #ffcc00); /* لمعة خلف الصورة */
        }

        .img-box img { 
            max-width: 85%; max-height: 85%; 
            object-fit: contain; 
            transition: 0.4s ease; 
        }
