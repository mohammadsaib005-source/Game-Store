<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>متجر الألعاب الاحترافي</title>
    <style>
        :root {
            --bg-color: #0b0b0b;
            --card-bg: #161616;
            --main-yellow: #ffcc00;
            --text-color: #ffffff;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* الهيدر باستخدام صورتك */
        .header {
            width: 100%;
            height: 250px;
            background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), url('Project Community.png');
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
            border-bottom: 3px solid var(--main-yellow);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .header h1 {
            font-size: 2.5rem;
            color: var(--main-yellow);
            text-shadow: 0 0 15px rgba(255, 204, 0, 0.5);
        }

        /* القائمة الرئيسية */
        .category-container {
            display: flex;
            gap: 30px;
            justify-content: center;
            padding: 60px 20px;
            flex-wrap: wrap;
        }

        .category-btn {
            background: var(--card-bg);
            border: 2px solid var(--main-yellow);
            padding: 50px;
            border-radius: 25px;
            cursor: pointer;
            width: 250px;
            text-align: center;
            transition: 0.4s ease;
        }

        .category-btn:hover {
            transform: translateY(-10px) scale(1.05);
            box-shadow: 0 0 25px var(--main-yellow);
        }

        /* قسم المنتجات */
        #products-section {
            display: none; /* مخفي في البداية */
            width: 90%;
            max-width: 1200px;
            padding: 40px 0;
        }

        .product-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
            gap: 30px;
        }

        .card {
            background-color: var(--card-bg);
            border-radius: 20px;
            padding: 25px;
            text-align: center;
            border: 1px solid #333;
            transition: 0.3s;
        }

        .card:hover { border-color: var(--main-yellow); }

        .img-container {
            width: 100%;
            height: 200px;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 15px;
        }

        .img-container img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }

        .price { font-size: 2rem; color: var(--main-yellow); font-weight: bold; margin: 10px 0; }

        .add-btn {
            background-color: var(--main-yellow);
            color: #000;
            border: none;
            padding: 15px;
            width: 100%;
            border-radius: 12px;
            font-weight: bold;
            cursor: pointer;
            font-size: 1.1rem;
        }

        .back-btn {
            background: #222;
            color: #fff;
            border: 1px solid #444;
            padding: 10px 25px;
            border-radius: 10px;
            cursor: pointer;
            margin-bottom: 30px;
            transition: 0.3s;
        }
        .back-btn:hover { background: #333; }

        /* سلة المشتريات */
        #cart-status {
            position: fixed;
            bottom: 25px;
            left: 25px;
            background: var(--main-yellow);
            color: #000;
            padding: 15px 25px;
            border-radius: 50px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>مرحباً بكم في المتجر</h1>
    </div>

    <div id="main-menu" class="category-container">
        <div class="category-btn" onclick="showCategory('STEAL A BRAINROT')">
            <h2>STEAL A BRAINROT</h2>
        </div>
        <div class="category-btn" onclick="showCategory('BLOX FRUIT')">
            <h2>BLOX FRUIT</h2>
            <p style="font-size: 0.8rem; color: #888;">(قريباً)</p>
        </div>
    </div>

    <div id="products-section">
        <button class="back-btn" onclick="goHome()">← العودة للرئيسية</button>
        <h2 id="cat-name" style="color: var(--main-yellow); text-align: center; margin-bottom: 40px; font-size: 2rem;"></h2>
        <div class="product-grid" id="product-list"></div>
    </div>

    <div id="cart-status" onclick="viewCart()">🛒 السلة: <span id="cart-count">0</span></div>

    <script>
        let cart = [];

        // تأكد أن الامتداد png أو jpg حسب ما رفعت
        const inventory = {
            'STEAL A BRAINROT': [
                { name: 'Strawberry Elephant', price: 500, img: 'SE.png' },
                { name: 'Meowl', price: 400, img: 'ME.png' },
                { name: 'Skibidi Toilet', price: 300, img: 'SK.png' },
                { name: 'Dragon Cannelloni', price: 60, img: 'DR.png' }
            ]
        };

        function showCategory(cat) {
            if (!inventory[cat]) {
                alert("هذا القسم سيتم افتتاحه قريباً!");
                return;
            }

            document.getElementById('main-menu').style.display = 'none';
            document.getElementById('products-section').style.display = 'block';
            document.getElementById('cat-name').innerText = cat;

            const list = document.getElementById('product-list');
            list.innerHTML = '';

            inventory[cat].forEach(item => {
                list.innerHTML += `
                    <div class="card">
                        <div class="img-container">
                            <img src="${item.img}" alt="${item.name}" onerror="this.src='https://via.placeholder.com/200?text=Image+Not+Found'">
                        </div>
                        <h2>${item.name}</h2>
                        <p class="price">$${item.price}</p>
                        <button class="add-btn" onclick="addToCart('${item.name}', ${item.price})">أضف للسلة</button>
                    </div>
                `;
            });
            window.scrollTo(0, 0); // للعودة لأعلى الصفحة
        }

        function goHome() {
            document.getElementById('main-menu').style.display = 'flex';
            document.getElementById('products-section').style.display = 'none';
        }

        function addToCart(name, price) {
            cart.push({name, price});
            document.getElementById('cart-count').innerText = cart.length;
            alert("تم إضافة " + name + " لسلتك!");
        }

        function viewCart() {
            if (cart.length === 0) return alert("سلتك فارغة!");
            let total = cart.reduce((s, i) => s + i.price, 0);
            let summary = "طلباتك الحالية:\n" + cart.map(i => "- " + i.name + " ($" + i.price + ")").join("\n");
            alert(summary + "\n\nالمجموع: $" + total);
        }
    </script>
</body>
</html>
