<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>متجر روبلوكس الاحترافي</title>
    <style>
        :root {
            --bg-color: #0a0a0a;
            --card-bg: #1a1a1a;
            --main-yellow: #ffcc00;
            --text-color: #ffffff;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* تنسيق قسم البانر */
        .header-container {
            width: 100%;
            max-width: 900px;
            margin-top: 20px;
            display: flex;
            justify-content: center;
        }

        .header-container img {
            width: 100%;
            height: auto;
            border-radius: 15px;
            box-shadow: 0 0 20px rgba(255, 204, 0, 0.2);
            /* هاض السطر عشان لو الصورة ما حملت يظهر إطار جميل بدل العلامة المكسورة */
            min-height: 100px;
            background-color: #111;
        }

        h1 {
            color: var(--main-yellow);
            margin: 30px 0;
            text-align: center;
        }

        .container {
            display: flex;
            justify-content: center;
            gap: 25px;
            flex-wrap: wrap;
            padding-bottom: 50px;
        }

        .card {
            background-color: var(--card-bg);
            border-radius: 20px;
            width: 280px;
            padding: 30px 20px;
            text-align: center;
            position: relative;
            border: 1px solid #333;
            margin-top: 50px;
        }

        .icon-circle {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, var(--main-yellow), #f39c12);
            border-radius: 50%;
            position: absolute;
            top: -40px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            justify-content: center;
            align-items: center;
            border: 5px solid var(--card-bg);
        }

        .price {
            font-size: 2.2rem;
            color: var(--main-yellow);
            font-weight: bold;
            margin: 10px 0;
        }

        .buy-btn {
            background-color: var(--main-yellow);
            color: black;
            border: none;
            padding: 12px;
            width: 100%;
            border-radius: 10px;
            font-weight: bold;
            cursor: pointer;
            font-size: 1.1rem;
        }
    </style>
</head>
<body>

    <div class="header-container">
        <img src="banner.png" alt="Roblox Header">
    </div>

    <h1>WELCOME TO MY GAME STORE</h1>

    <div class="container">
        <div class="card">
            <div class="icon-circle">🔥</div>
            <h2>Blox Fruits Items</h2>
            <p class="price">$10</p>
            <p>فواكه نادرة وأدوات قوية متوفرة فوراً.</p>
            <button class="buy-btn">Buy with Crypto</button>
        </div>

        <div class="card">
            <div class="icon-circle">🏗️</div>
            <h2>تطوير ماب كامل</h2>
            <p class="price">$5</p>
            <p>بناء وبرمجة ماب احترافي من الصفر.</p>
            <button class="buy-btn">Buy with Crypto</button>
        </div>
    </div>

</body>
</html>
