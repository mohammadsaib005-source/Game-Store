<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A7X STORE | المتجر الرسمي</title>
    <style>
        /* خلفية متحركة فخمة */
        body {
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: linear-gradient(-45deg, #000000, #1a1a1a, #0a0a0a, #222);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow-x: hidden;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* عنوان المتجر */
        .store-title {
            font-size: 4rem;
            font-weight: 900;
            color: #ffcc00;
            text-shadow: 0 0 20px rgba(255, 204, 0, 0.6);
            margin-bottom: 10px;
            letter-spacing: 5px;
        }

        .store-subtitle {
            font-size: 1.2rem;
            color: #888;
            margin-bottom: 50px;
        }

        /* حاوية المابات */
        .container {
            display: flex;
            gap: 30px;
            flex-wrap: wrap;
            justify-content: center;
        }

        /* تصميم كرت الماب */
        .map-card {
            background: rgba(20, 20, 20, 0.8);
            border: 2px solid #333;
            border-radius: 20px;
            width: 300px;
            padding: 20px;
            text-align: center;
            text-decoration: none;
            color: white;
            transition: all 0.4s ease;
            position: relative;
            overflow: hidden;
            backdrop-filter: blur(10px);
        }

        .map-card:hover {
            transform: translateY(-15px) scale(1.05);
            border-color: #ffcc00;
            box-shadow: 0 0 30px rgba(255, 204, 0, 0.3);
        }

        .map-card img {
            width: 100%;
            border-radius: 15px;
            margin-bottom: 15px;
            transition: 0.4s;
        }

        .map-card:hover img {
            transform: scale(1.1);
        }

        .map-card h3 {
            font-size: 1.5rem;
            margin: 10px 0;
            color: #fff;
        }

        .status-tag {
            display: inline-block;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: bold;
            margin-top: 10px;
        }

        .online { background: #ffcc00; color: black; }
        .soon { background: #333; color: #888; }

        /* تذييل الصفحة */
        .footer {
            margin-top: 60px;
            color: #555;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>

    <h1 class="store-title">A7X STORE</h1>
    <p class="store-subtitle">وجهتك الأولى لأفضل أغراض المابات</p>

    <div class="container">
        <a href="bloxfruit.html" class="map-card">
            <img src="https://i.ibb.co/pBTX7mS/bloxfruit-logo.png" alt="Blox Fruit"> 
            <h3>BLOX FRUIT</h3>
            <span class="status-tag soon">قريباً جداً</span>
        </a>

        <a href="brainrot.html" class="map-card">
            <img src="Project_Community-removebg-preview.png" alt="Steal a Brainrot">
            <h3>STEAL A BRAINROT</h3>
            <span class="status-tag online">تسوّق الآن</span>
        </a>
    </div>

    <div class="footer">
        © 2026 A7X STORE - جميع الحقوق محفوظة
    </div>

</body>
</html>
