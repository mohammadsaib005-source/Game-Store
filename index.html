<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A7X STORE | المتجر الرسمي</title>
    <style>
        /* كود التصميم الأصلي الخاص بك */
        body {
            margin: 0; padding: 0; display: flex; flex-direction: column;
            align-items: center; justify-content: center; min-height: 100vh;
            background: radial-gradient(circle at center, #111 0%, #000 100%);
            color: white; font-family: 'Segoe UI', sans-serif; overflow-x: hidden;
        }

        .store-title {
            font-size: 4.5rem; font-weight: 900; color: #ffcc00;
            text-shadow: 0 0 30px rgba(255, 204, 0, 0.5); margin: 0; letter-spacing: 4px;
        }

        .store-subtitle { font-size: 1.1rem; color: #888; margin-bottom: 15px; }

        .social-links { margin-bottom: 40px; display: flex; gap: 20px; }
        
        .social-btn {
            background: none; color: #ffcc00; text-decoration: none; font-size: 0.9rem;
            border: 1px solid rgba(255, 204, 0, 0.3); padding: 5px 15px;
            border-radius: 20px; transition: 0.3s; cursor: pointer;
        }
        .social-btn:hover { background: #ffcc00; color: black; box-shadow: 0 0 15px #ffcc00; }

        .container { display: flex; gap: 40px; flex-wrap: wrap; justify-content: center; padding: 20px; }

        .map-card {
            background: rgba(255, 255, 255, 0.03); border: 1px solid #222;
            border-radius: 30px; width: 320px; padding: 25px; text-align: center;
            text-decoration: none; color: white; transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            backdrop-filter: blur(10px);
        }

        .map-card:hover { transform: translateY(-20px); border-color: #ffcc00; box-shadow: 0 20px 40px rgba(0,0,0,0.6); }

        .img-container {
            width: 100%; height: 180px; border-radius: 20px; overflow: hidden;
            margin-bottom: 20px; background: #000; display: flex; align-items: center; justify-content: center;
        }
        .map-card img { max-width: 100%; max-height: 100%; transition: 0.5s; }
        .map-card:hover img { transform: scale(1.15) rotate(2deg); }

        .status { font-size: 0.85rem; font-weight: bold; padding: 6px 16px; border-radius: 50px; display: inline-block; margin-top: 10px; }
        .online { background: #ffcc00; color: black; box-shadow: 0 0 10px rgba(255, 204, 0, 0.4); }
        .soon { background: #1a1a1a; color: #555; border: 1px solid #333; }

        /* نظام التنبيهات */
        #customAlert {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); z-index: 9999; justify-content: center; align-items: center;
        }
        .alert-box {
            background: #0a0a0a; border: 2px solid #ffcc00; padding: 35px; border-radius: 25px;
            text-align: center; max-width: 350px; box-shadow: 0 0 50px rgba(255, 204, 0, 0.2);
        }
        .loader {
            border: 3px solid #111; border-top: 3px solid #ffcc00; border-radius: 50%;
            width: 30px; height: 30px; animation: spin 1s linear infinite; margin: 20px auto;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* تنسيقات إضافية لقسم التقييمات لضمان التناسق */
        .reviews-section input, .reviews-section textarea {
            outline: none;
        }
        .reviews-section input:focus, .reviews-section textarea:focus {
            border-color: #ffcc00 !important;
        }
    </style>
</head>
<body>

    <h1 class="store-title">A7X STORE</h1>
    <p class="store-subtitle">وجهتك الأولى لأفضل أغراض المابات</p>

    <div class="social-links">
        <button class="social-btn" onclick="handleLink('discord')">Discord 👾</button>
        <button class="social-btn" onclick="handleLink('tiktok')">TikTok 📱</button>
    </div>

    <div class="container">
        <a href="bloxfruit.html" class="map-card">
            <div class="img-container"><img src="BF" alt="Blox Fruit"></div>
            <h3>BLOX FRUIT</h3>
            <span class="status soon">قريباً جداً</span>
        </a>
        <a href="brainrot.html" class="map-card">
            <div class="img-container"><img src="SAB" alt="Steal a Brainrot"></div>
            <h3>STEAL A BRAINROT</h3>
            <span class="status online">تسوّق الآن</span>
        </a>
    </div>

    <hr style="border: 0; border-top: 1px solid #222; margin: 80px 0 40px 0; width: 80%;">

    <section class="reviews-section" style="padding: 0 10% 80px 10%; width: 100%; max-width: 800px;">
        <h2 style="color: #ffcc00; margin-bottom: 30px; text-align: center; font-size: 2.5rem;">تقييماتنا ⭐️</h2>
        
        <div id="reviews-container" style="display: flex; flex-direction: column; gap: 15px; margin-bottom: 40px;">
            <div style="background: rgba(255,255,255,0.03); padding: 20px; border-radius: 15px; border-right: 5px solid #ffcc00; backdrop-filter: blur(5px);">
                <strong style="color: #ffcc00; font-size: 1.1rem;">أحمد:</strong>
                <p style="margin: 8px 0 0 0; color: #bbb; line-height: 1.5;">أفضل متجر تعاملت معه، بانتظار توفر البرين روت!</p>
            </div>
        </div>

        <div style="background: rgba(255,255,255,0.02); padding: 30px; border-radius: 25px; border: 1px solid #222; width: 100%; box-sizing: border-box;">
            <h4 style="margin-top: 0; color: #fff; font-size: 1.2rem;">أضف تقييمك (للمشترين فقط)</h4>
            <input type="text" id="reviewer-name" placeholder="اسمك" style="width: 100%; padding: 12px; margin-bottom: 15px; background: #111; border: 1px solid #333; color: white; border-radius: 10px; box-sizing: border-box;">
            <textarea id="review-text" placeholder="اكتب تقييمك هنا..." style="width: 100%; padding: 12px; height: 100px; background: #111; border: 1px solid #333; color: white; border-radius: 10px; box-sizing: border-box; resize: none;"></textarea>
            
            <div style="margin: 15px 0; text-align: right;">
                <label style="font-size: 0.9rem; color: #888; cursor: pointer;">
                    <input type="checkbox" id="has-purchased" style="accent-color: #ffcc00;"> لقد قمت بشراء منتج من المتجر سابقاً
                </label>
            </div>
            
            <button onclick="addReview()" style="background: #ffcc00; color: black; border: none; padding: 12px; border-radius: 10px; font-weight: bold; cursor: pointer; width: 100%; transition: 0.3s; font-size: 1rem;">نشر التقييم</button>
        </div>
    </section>

    <div id="customAlert">
        <div class="alert-box">
            <h2 id="alertTitle" style="color: #ffcc00; margin: 0;"></h2>
            <p id="alertBody" style="margin: 15px 0; color: #ccc;"></p>
            <div id="alertLoader" class="loader"></div>
            <button id="alertBtn" class="social-btn" style="display:none; margin-top: 10px;" onclick="document.getElementById('customAlert').style.display='none'">حسناً</button>
        </div>
    </div>

    <script>
        // وظيفة التنبيهات الأصلية
        function handleLink(type) {
            const modal = document.getElementById('customAlert');
            const title = document.getElementById('alertTitle');
            const body = document.getElementById('alertBody');
            const loader = document.getElementById('alertLoader');
            const btn = document.getElementById('alertBtn');

            modal.style.display = 'flex';
            if(type === 'discord') {
                title.innerText = 'جارٍ التحويل...';
                body.innerText = 'يتم الآن نقلك إلى سيرفر الديسكورد الخاص بنا.';
                loader.style.display = 'block';
                btn.style.display = 'none';
                setTimeout(() => { window.location.href = 'https://discord.gg/472RS8rT'; }, 2000);
            } else {
                title.innerText = 'تنبيه';
                body.innerText = 'سننشر رابط صفحتنا الخاصة على تيك توك قريباً جداً!';
                loader.style.display = 'none';
                btn.style.display = 'inline-block';
            }
        }

        // وظيفة إضافة التقييم
        function addReview() {
            const name = document.getElementById('reviewer-name').value;
            const text = document.getElementById('review-text').value;
            const purchased = document.getElementById('has-purchased').checked;

            if (!purchased) {
                alert("عذراً، التقييم متاح فقط للزبائن الذين قاموا بعملية شراء واحدة على الأقل!");
                return;
            }

            if (name && text) {
                const container = document.getElementById('reviews-container');
                const newReview = document.createElement('div');
                newReview.style = "background: rgba(255,255,255,0.03); padding: 20px; border-radius: 15px; border-right: 5px solid #ffcc00; backdrop-filter: blur(5px); text-align: right; animation: fadeIn 0.5s ease;";
                newReview.innerHTML = `<strong style="color: #ffcc00; font-size: 1.1rem;">${name}:</strong><p style="margin: 8px 0 0 0; color: #bbb; line-height: 1.5;">${text}</p>`;
                container.appendChild(newReview);
                
                // مسح الحقول بعد الإضافة
                document.getElementById('reviewer-name').value = '';
                document.getElementById('review-text').value = '';
                document.getElementById('has-purchased').checked = false;
            } else {
                alert("الرجاء تعبئة جميع الحقول!");
            }
        }
    </script>

    <style>
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</body>
</html>
