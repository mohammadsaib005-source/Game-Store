<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>متجر الألعاب | الرئيسية</title>
    <style>
        body {
            background: #000;
            color: white;
            font-family: sans-serif;
            text-align: center;
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .hero-section {
            padding: 40px;
        }

        /* تصميم الكرت في الرئيسية */
        .cat-container {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-top: 50px;
        }

        .cat-card {
            background: #111;
            border: 2px solid #ffcc00;
            padding: 40px;
            border-radius: 20px;
            width: 250px;
            cursor: pointer;
            transition: 0.3s;
            text-decoration: none;
            color: white;
        }

        .cat-card:hover {
            box-shadow: 0 0 30px #ffcc00;
            transform: scale(1.05);
        }

        /* رسالة التحذير المخصصة */
        .alert-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .alert-box {
            background: #111;
            border: 2px solid #ffcc00;
            padding: 40px;
            border-radius: 20px;
            text-align: center;
        }

        .alert-box button {
            background: #ffcc00;
            border: none;
            padding: 10px 30px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 20px;
        }
    </style>
</head>
<body>

    <div class="hero-section">
        <h1 style="font-size: 3rem; color: #ffcc00;">مرحباً بك في متجرنا الخاص</h1>
    </div>

    <div class="cat-container">
        <a href="brainrot.html" class="cat-card">
            <h2>STEAL A BRAINROT</h2>
            <p>تسوّق الآن</p>
        </a>
        <div class="cat-card" onclick="showAlert()">
            <h2>BLOX FRUIT</h2>
            <p>قريباً جداً</p>
        </div>
    </div>

    <div id="overlay" class="alert-overlay">
        <div class="alert-box">
            <h2 style="color: #ffcc00;">⚠️ تنبيه</h2>
            <p>سوف نوفر هذا الماب قريباً جداً!</p>
            <button onclick="hideAlert()">فهمت</button>
        </div>
    </div>

    <script>
        function showAlert() { document.getElementById('overlay').style.display = 'flex'; }
        function hideAlert() { document.getElementById('overlay').style.display = 'none'; }
    </script>
</body>
</html>
