<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A7X STORE | المتجر الرسمي</title>
    <style>
        body {
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: radial-gradient(circle at center, #111 0%, #000 100%);
            color: white;
            font-family: 'Segoe UI', sans-serif;
            overflow: hidden;
        }

        .store-title {
            font-size: 4.5rem;
            font-weight: 900;
            color: #ffcc00;
            text-shadow: 0 0 30px rgba(255, 204, 0, 0.5);
            margin: 0;
            letter-spacing: 4px;
        }

        .store-subtitle {
            font-size: 1.1rem;
            color: #888;
            margin-bottom: 25px;
        }

        /* روابط السوشيال ميديا */
        .social-links {
            margin-bottom: 40px;
            display: flex;
            gap: 20px;
        }

        .social-btn {
            background: none;
            color: #ffcc00;
            text-decoration: none;
            font-size: 1rem;
            border: 1px solid rgba(255, 204, 0, 0.3);
            padding: 10px 25px;
            border-radius: 25px;
            cursor: pointer;
            transition: 0.3s;
        }

        .social-btn:hover {
            background: #ffcc00;
            color: black;
            box-shadow: 0 0 20px #ffcc00;
        }

        .container {
            display: flex;
            gap: 40px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .map-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid #222;
            border-radius: 30px;
            width: 300px;
            padding: 25px;
            text-align: center;
            text-decoration: none;
            color: white;
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            backdrop-filter: blur(10px);
        }

        .map-card:hover {
            transform: translateY(-15px);
            border-color: #ffcc00;
        }
