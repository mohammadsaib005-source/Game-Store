<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roblox Store | الأقسام</title>
    <style>
        :root {
            --bg-color: #0b0b0b;
            --card-bg: #161616;
            --main-yellow: #ffcc00;
            --text-color: #ffffff;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .header-banner {
            width: 100%;
            display: flex;
            justify-content: center;
            padding: 30px 0;
            background: linear-gradient(to bottom, #1a1a1a, #0b0b0b);
        }

        .header-banner img {
            max-width: 85%;
            height: auto;
            border-radius: 15px;
            filter: drop-shadow(0px 0px 10px rgba(255, 204, 0, 0.3));
        }

        h1 {
            color: var(--main-yellow);
            margin: 40px 0;
            text-shadow: 0 0 15px rgba(255, 204, 0, 0.3);
        }

        /* حاوية الأزرار الكبيرة */
        .category-container {
            display: flex;
            gap: 40px;
            flex-wrap: wrap;
            justify-content: center;
            padding: 20px;
        }

        /* تصميم الأزرار الكبيرة مع الأنيميشن */
        .category-btn {
            background-color: var(--card-bg);
            border: 2px solid var(--main-yellow);
            border-radius: 20px;
            width: 320px; /* حجم أكبر */
            padding: 50px 20px;
            cursor: pointer;
            position: relative;
            overflow: hidden; /* لإخفاء لمعة الأنيميشن */
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex;
            flex-direction: column;
            align-items: center;
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
        }

        .category-btn h2 {
            margin: 15px 0 0;
            color: #fff;
            font-size: 1.8rem;
            letter-spacing: 1px;
        }

        /* تأثير التكبير عند التقريب */
        .category-btn:hover {
            transform: scale(1.1);
            box-shadow: 0 0 30px rgba(255, 204, 0, 0.4);
            background-color: #1a1a1a;
        }

        /* تأثير اللمعان (Shine Animation) */
        .category-btn::after {
            content: "";
            position: absolute;
            top: -50%;
            left: -60%;
            width: 20%;
            height: 200%;
            background: rgba(255, 255, 255, 0.2);
            transform: rotate(30deg);
            transition: none;
        }

        .category-btn:hover::after {
            left: 120%;
            transition: all 0.7s ease-in-out;
        }

        .icon-large {
            font-size: 4rem;
        }

        /* قسم المنتجات المخفي */
        #products-section {
            display: none;
            margin-top: 50px;
            width: 90%;
            max-width: 1000px;
            border-top: 2px solid #333;
            padding-top: 30px;
            text-align: center;
        }

        .product-grid {
            display: flex;
            gap: 20px;
            justify-content: center;
            margin-top: 20px;
        }

        .product-card {
            background: #222;
            padding: 20px;
            border-radius: 10px;
            width: 200px;
        }

        .back-btn {
            background: none;
            border: 1px solid var(--main-yellow);
            color: var(--main-yellow);
            padding: 10px 20px;
            cursor: pointer;
            margin-bottom: 20px;
            border-radius: 5px;
        }
    </style>
</head>
<body>

    <div class="header-banner">
        <img src="banner.png" alt="Roblox Header">
    </div>

    <div id="main-menu">
        <h1>إختر الماب لتصفح المنتجات</h1>

        <div class="category-container">
            <div class="category-btn" onclick="showProducts('BLOX FRUIT')">
                <div class="icon-large">🍎</div>
                <h2>BLOX FRUIT</h2>
            </div>

            <div class="category-btn" onclick="showProducts('STEAL A BRAINROT')">
                <div class="icon-large">🧠</div>
                <h2>STEAL A BRAINROT</h2>
            </div>
        </div>
    </div>

    <div id="products-section">
        <button class="back-btn" onclick="goBack()">← العودة للأقسام</button>
        <h2 id="category-title" style="color: var(--main-yellow);"></h2>
        
        <div class="product-grid" id="product-list">
            </div>
    </div>

    <script>
        const productsData = {
            'BLOX FRUIT': [
                { name: 'Leopard Fruit', price: '$15' },
                { name: 'Dragon Fruit', price: '$20' },
                { name: 'Gamepass 2x Mastery', price: '$10' }
            ],
            'STEAL A BRAINROT': [
                { name: 'Infinite Energy', price: '$5' },
                { name: 'Custom Skin', price: '$8' },
                { name: 'VIP Map Access', price: '$12' }
            ]
        };

        function showProducts(category) {
            document.getElementById('main-menu').style.display = 'none';
            const section = document.getElementById('products-section');
            const title = document.getElementById('category-title');
            const list = document.getElementById('product-list');

            section.style.display = 'block';
            title.innerText = "منتجات " + category;
            list.innerHTML = ''; // تنظيف القائمة السابقة

            productsData[category].forEach(item => {
                list.innerHTML += `
                    <div class="product-card">
                        <h3>${item.name}</h3>
                        <p style="color: #ffcc00; font-weight: bold;">${item.price}</p>
                        <button style="width:100%; background:#ffcc00; border:none; padding:8px; border-radius:5px; font-weight:bold; cursor:pointer;">شراء الآن</button>
                    </div>
                `;
            });
        }

        function goBack() {
            document.getElementById('main-menu').style.display = 'block';
            document.getElementById('products-section').style.display = 'none';
        }
    </script>

</body>
</html>
