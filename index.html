<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>متجر الألعاب الاحترافي</title>
    <style>
        :root {
            --bg-color: #0b0b0b;
            --card-bg: #161616;
            --main-yellow: #ffcc00;
            --text-color: #ffffff;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding-bottom: 100px;
        }

        /* بانر عرض الألعاب الكبير */
        .hero-banner {
            width: 100%;
            height: 400px;
            background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.8)), 
                        url('https://images.squarespace-cdn.com/content/v1/5bb260f89d5abb54a938883a/1619602495632-1ST87258W26Q6Q6R6X4I/Roblox+Games.jpg');
            background-size: cover;
            background-position: center;
            display: flex;
            align-items: center;
            justify-content: center;
            border-bottom: 4px solid var(--main-yellow);
        }

        .hero-banner h1 {
            font-size: 3.5rem;
            color: var(--main-yellow);
            text-shadow: 3px 3px 10px rgba(0,0,0,1);
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
            text-align: center;
        }

        /* نظام الأقسام مع أنيميشن اللمعان */
        .category-container {
            display: flex;
            gap: 30px;
            justify-content: center;
            margin-top: 50px;
        }

        .category-btn {
            background: var(--card-bg);
            border: 2px solid var(--main-yellow);
            padding: 40px;
            border-radius: 20px;
            cursor: pointer;
            width: 300px;
            position: relative;
            overflow: hidden;
            transition: 0.4s;
        }

        .category-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 20px var(--main-yellow);
        }

        .category-btn::after {
            content: "";
            position: absolute;
            top: -50%; left: -60%; width: 20%; height: 200%;
            background: rgba(255,255,255,0.2);
            transform: rotate(30deg);
        }

        .category-btn:hover::after {
            left: 120%;
            transition: 0.7s;
        }

        /* سلة المشتريات */
        #cart-status {
            position: fixed;
            bottom: 20px;
            left: 20px;
            background: var(--main-yellow);
            color: black;
            padding: 15px 25px;
            border-radius: 50px;
            font-weight: bold;
            cursor: pointer;
            z-index: 1000;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
        }

        /* شبكة المنتجات */
        .product-grid {
            display: none;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 20px;
            margin-top: 30px;
        }

        .product-card {
            background: var(--card-bg);
            padding: 15px;
            border-radius: 15px;
            border: 1px solid #333;
        }

        .product-card img {
            width: 100%;
            height: 150px;
            object-fit: contain;
            border-radius: 10px;
            background: #222;
        }

        .buy-btn {
            background: var(--main-yellow);
            border: none;
            padding: 10px;
            width: 100%;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
        }

        .back-btn {
            background: none;
            border: 1px solid #fff;
            color: #fff;
            padding: 10px 20px;
            cursor: pointer;
            border-radius: 10px;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>

    <div class="hero-banner">
        <h1>مرحباً بكم في المتجر</h1>
    </div>

    <div class="container" id="main-menu">
        <div class="category-container">
            <div class="category-btn" onclick="showCategory('BLOX FRUIT')">
                <h2>BLOX FRUIT</h2>
            </div>
            <div class="category-btn" onclick="showCategory('STEAL A BRAINROT')">
                <h2>STEAL A BRAINROT</h2>
            </div>
        </div>
    </div>

    <div class="container" id="category-page" style="display: none;">
        <button class="back-btn" onclick="goHome()">← العودة للرئيسية</button>
        <h2 id="cat-title" style="color: var(--main-yellow);"></h2>
        <div id="product-list" class="product-grid" style="display: grid;"></div>
    </div>

    <div id="cart-status" onclick="alertCart()">🛒 السلة: <span id="cart-count">0</span> غرض</div>

    <script>
        let cart = [];
        const products = {
            'STEAL A BRAINROT': [
                { name: 'Strawberry Elephant', price: 500, img: 'https://tr.rbxcdn.com/120dbdf18a472911b306b986872584e1/420/420/Image/Png' },
                { name: 'Meowl', price: 400, img: 'https://tr.rbxcdn.com/60050851e441319760089886872584e1/420/420/Image/Png' },
                { name: 'Skibidi Toilet', price: 300, img: 'https://tr.rbxcdn.com/13900851e441319760089886872584e1/420/420/Image/Png' },
                { name: 'Dragon Cannelloni', price: 60, img: 'https://tr.rbxcdn.com/97150851e441319760089886872584e1/420/420/Image/Png' }
            ],
            'BLOX FRUIT': [
                { name: 'Kitsune Fruit', price: 20, img: 'https://tr.rbxcdn.com/02000851e441319760089886872584e1/420/420/Image/Png' },
                { name: 'Leopard Fruit', price: 15, img: 'https://tr.rbxcdn.com/22000851e441319760089886872584e1/420/420/Image/Png' }
            ]
        };

        function showCategory(cat) {
            document.getElementById('main-menu').style.display = 'none';
            document.getElementById('category-page').style.display = 'block';
            document.getElementById('cat-title').innerText = cat;
            
            let list = document.getElementById('product-list');
            list.innerHTML = '';
            
            products[cat].forEach(p => {
                list.innerHTML += `
                    <div class="product-card">
                        <img src="${p.img}" alt="${p.name}">
                        <h3>${p.name}</h3>
                        <p style="color:var(--main-yellow); font-size:1.5rem;">$${p.price}</p>
                        <button class="buy-btn" onclick="addToCart('${p.name}', ${p.price})">أضف للسلة</button>
                    </div>
                `;
            });
        }

        function addToCart(name, price) {
            cart.push({name, price});
            document.getElementById('cart-count').innerText = cart.length;
            alert('تمت إضافة ' + name + ' للسلة!');
        }

        function alertCart() {
            if(cart.length === 0) return alert("السلة فارغة!");
            let msg = "محتويات السلة:\n";
            let total = 0;
            cart.forEach(i => {
                msg += `- ${i.name}: $${i.price}\n`;
                total += i.price;
            });
            msg += `\nالمجموع الكلي: $${total}`;
            alert(msg);
        }

        function goHome() {
            document.getElementById('main-menu').style.display = 'block';
            document.getElementById('category-page').style.display = 'none';
        }
    </script>
</body>
</html>
