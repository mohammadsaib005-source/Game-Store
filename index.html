<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>متجر البرينروت الاحترافي</title>
    <style>
        :root {
            --bg-color: #0b0b0b;
            --card-bg: #161616;
            --main-yellow: #ffcc00;
            --text-color: #ffffff;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* --- الهيدر الفخم --- */
        .header {
            width: 100%;
            padding: 60px 0;
            background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.9)), url('Project Community.png');
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
            border-bottom: 3px solid var(--main-yellow);
            text-align: center;
        }

        .header h1 {
            font-size: 3rem;
            color: var(--main-yellow);
            text-shadow: 0 0 20px rgba(255, 204, 0, 0.5);
            margin: 0;
        }

        /* --- الحاوية والشبكة --- */
        .container {
            max-width: 1200px;
            padding: 50px 20px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 30px;
            width: 90%;
        }

        /* --- تصميم الكروت --- */
        .card {
            background-color: var(--card-bg);
            border-radius: 20px;
            padding: 25px;
            text-align: center;
            border: 1px solid #333;
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
            overflow: hidden;
        }

        .card:hover {
            transform: translateY(-10px);
            border-color: var(--main-yellow);
            box-shadow: 0 10px 30px rgba(255, 204, 0, 0.2);
        }

        .img-container {
            width: 100%;
            height: 180px;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 20px;
            background: rgba(255,255,255,0.02);
            border-radius: 15px;
        }

        .img-container img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            filter: drop-shadow(0 5px 15px rgba(0,0,0,0.5));
        }

        .card h2 {
            margin: 10px 0;
            font-size: 1.4rem;
        }

        .price {
            font-size: 2rem;
            color: var(--main-yellow);
            font-weight: bold;
            margin: 15px 0;
        }

        /* --- أزرار الشراء --- */
        .add-btn {
            background-color: var(--main-yellow);
            color: #000;
            border: none;
            padding: 12px;
            width: 100%;
            border-radius: 12px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            font-size: 1.1rem;
        }

        .add-btn:hover {
            background-color: #fff;
            transform: scale(1.05);
        }

        /* --- سلة المشتريات العائمة --- */
        #cart-button {
            position: fixed;
            bottom: 30px;
            left: 30px;
            background: var(--main-yellow);
            color: #000;
            padding: 15px 25px;
            border-radius: 50px;
            font-weight: bold;
            box-shadow: 0 10px 20px rgba(0,0,0,0.4);
            cursor: pointer;
            z-index: 999;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: 0.3s;
        }

        #cart-button:hover { transform: scale(1.1); }

        .back-btn {
            margin-top: 20px;
            background: none;
            border: 1px solid #555;
            color: #ccc;
            padding: 8px 20px;
            border-radius: 8px;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>مرحباً بكم في المتجر</h1>
        <button class="back-btn">← العودة للرئيسية</button>
    </div>

    <div class="container">
        <div class="card">
            <div class="img-container">
                <img src="image_2026-03-14_000115590-removebg-preview.png" alt="Strawberry Elephant">
            </div>
            <h2>Strawberry Elephant</h2>
            <p class="price">$500</p>
            <button class="add-btn" onclick="addToCart('Strawberry Elephant', 500)">أضف للسلة</button>
        </div>

        <div class="card">
            <div class="img-container">
                <img src="image_2026-03-14_000156252-removebg-preview.png" alt="Meowl">
            </div>
            <h2>Meowl</h2>
            <p class="price">$400</p>
            <button class="add-btn" onclick="addToCart('Meowl', 400)">أضف للسلة</button>
        </div>

        <div class="card">
            <div class="img-container">
                <img src="image_2026-03-14_000221800-removebg-preview.png" alt="Skibidi Toilet">
            </div>
            <h2>Skibidi Toilet</h2>
            <p class="price">$300</p>
            <button class="add-btn" onclick="addToCart('Skibidi Toilet', 300)">أضف للسلة</button>
        </div>

        <div class="card">
            <div class="img-container">
                <img src="image_2026-03-14_000246005-removebg-preview.png" alt="Dragon Cannelloni">
            </div>
            <h2>Dragon Cannelloni</h2>
            <p class="price">$60</p>
            <button class="add-btn" onclick="addToCart('Dragon Cannelloni', 60)">أضف للسلة</button>
        </div>
    </div>

    <div id="cart-button" onclick="showCart()">
        🛒 السلة: <span id="cart-count">0</span> غرض
    </div>

    <script>
        let cart = [];

        function addToCart(name, price) {
            cart.push({name, price});
            document.getElementById('cart-count').innerText = cart.length;
            
            // انيميشن بسيط للزر عند الاضافة
            const btn = event.target;
            btn.innerText = "تمت الإضافة! ✓";
            btn.style.backgroundColor = "#4CAF50";
            btn.style.color = "#fff";
            
            setTimeout(() => {
                btn.innerText = "أضف للسلة";
                btn.style.backgroundColor = "#ffcc00";
                btn.style.color = "#000";
            }, 1000);
        }

        function showCart() {
            if (cart.length === 0) {
                alert("سلتك فارغة حالياً!");
                return;
            }
            let message = "مشترياتك الحالية:\n\n";
            let total = 0;
            cart.forEach((item, index) => {
                message += `${index + 1}. ${item.name} - $${item.price}\n`;
                total += item.price;
            });
            message += `\nالمجموع الكلي: $${total}\n\nهل تود إتمام الشراء؟`;
            
            if (confirm(message)) {
                alert("سيتم توجيهك لصفحة الدفع قريباً!");
            }
        }
    </script>
</body>
</html>
