<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>متجر الألعاب الاحترافي</title>
    <style>
        :root {
            --bg-color: #0b0b0b;
            --card-bg: #161616;
            --main-yellow: #ffcc00;
            --text-color: #ffffff;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* --- الهيدر --- */
        .header {
            width: 100%;
            padding: 60px 0;
            background: linear-gradient(rgba(0,0,0,0.8), rgba(0,0,0,0.9)), url('Project Community.png');
            background-size: cover;
            background-position: center;
            border-bottom: 3px solid var(--main-yellow);
            text-align: center;
        }

        .header h1 {
            font-size: 3rem;
            color: var(--main-yellow);
            text-shadow: 0 0 20px rgba(255, 204, 0, 0.5);
            margin: 0;
        }

        /* --- حاوية الأقسام الرئيسية --- */
        .category-container {
            display: flex;
            gap: 30px;
            justify-content: center;
            padding: 50px 20px;
            flex-wrap: wrap;
        }

        .category-btn {
            background: var(--card-bg);
            border: 2px solid var(--main-yellow);
            padding: 40px;
            border-radius: 20px;
            cursor: pointer;
            width: 280px;
            text-align: center;
            transition: 0.4s;
        }

        .category-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 20px var(--main-yellow);
        }

        /* --- قسم المنتجات (مخفي افتراضياً) --- */
        #products-section {
            display: none; 
            width: 90%;
            max-width: 1200px;
            padding: 40px 0;
        }

        .product-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 30px;
        }

        .card {
            background-color: var(--card-bg);
            border-radius: 20px;
            padding: 25px;
            text-align: center;
            border: 1px solid #333;
            transition: 0.3s;
        }

        .card:hover { border-color: var(--main-yellow); }

        .img-container {
            width: 100%;
            height: 180px;
            display: flex;
            justify-content: center;
            align-items: center;
            background: rgba(255,255,255,0.02);
            border-radius: 15px;
            margin-bottom: 15px;
        }

        .img-container img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }

        .price { font-size: 1.8rem; color: var(--main-yellow); font-weight: bold; }

        .add-btn {
            background-color: var(--main-yellow);
            color: #000;
            border: none;
            padding: 12px;
            width: 100%;
            border-radius: 12px;
            font-weight: bold;
            cursor: pointer;
        }

        .back-btn {
            background: #333;
            color: #fff;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            margin-bottom: 20px;
        }

        /* --- السلة --- */
        #cart-button {
            position: fixed;
            bottom: 30px;
            left: 30px;
            background: var(--main-yellow);
            color: #000;
            padding: 15px 25px;
            border-radius: 50px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>مرحباً بكم في المتجر</h1>
    </div>

    <div id="main-menu" class="category-container">
        <div class="category-btn" onclick="showCategory('STEAL A BRAINROT')">
            <h2>STEAL A BRAINROT</h2>
        </div>
        <div class="category-btn" onclick="showCategory('BLOX FRUIT')">
            <h2>BLOX FRUIT (قريباً)</h2>
        </div>
    </div>

    <div id="products-section">
        <button class="back-btn" onclick="goBack()">← العودة للأقسام</button>
        <h2 id="current-category" style="color: var(--main-yellow); text-align: center; margin-bottom: 30px;"></h2>
        <div class="product-grid" id="product-display">
            </div>
    </div>

    <div id="cart-button" onclick="alertCart()">🛒 السلة: <span id="cart-count">0</span></div>
