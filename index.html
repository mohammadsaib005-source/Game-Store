<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <title>Game Store | متجر الألعاب</title>
    <style>
        /* هاض هو الـ CSS اللي بيعطي شكل للموقع */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #1a1a2e; /* لون خلفية غامق للألعاب */
            color: white;
            margin: 0;
            padding: 20px;
            text-align: center;
        }

        h1 { color: #00d2ff; text-transform: uppercase; margin-bottom: 30px; }

        .container {
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
        }

        .card {
            background-color: #16213e;
            border: 1px solid #0f3460;
            border-radius: 15px;
            padding: 20px;
            width: 250px;
            transition: 0.3s;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        .card:hover { transform: translateY(-10px); border-color: #e94560; }

        .card img {
            width: 100%;
            height: 150px;
            border-radius: 10px;
            object-fit: cover; /* عشان الصورة ما تخرب أبعادها */
            background-color: #333;
        }

        .price { font-size: 1.5rem; color: #4ecca3; margin: 15px 0; }

        button {
            background-color: #e94560;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            width: 100%;
        }

        button:hover { background-color: #ff2e63; }
    </style>
</head>
<body>

    <h1>Welcome to My Game Store</h1>

    <div class="container">
        <div class="card">
            <img src="https://via.placeholder.com/250x150?text=Minecraft" alt="Game 1">
            <h2>Minecraft</h2>
            <p class="price">$5</p>
            <button onclick="alert('سوف يتم توجيهك للدفع قريباً!')">Buy Now</button>
        </div>

        <div class="card">
            <img src="https://via.placeholder.com/250x150?text=GTA+V" alt="Game 2">
            <h2>GTA V</h2>
            <p class="price">$10</p>
            <button onclick="alert('سوف يتم توجيهك للدفع قريباً!')">Buy Now</button>
        </div>
    </div>

</body>
</html>
