<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>متجر روبلوكس | Roblox Store</title>
    <style>
        /* --- الألوان المتناسقة (أسود وأصفر) --- */
        :root {
            --bg-color: #0b0b0b;   /* خلفية سوداء فخمة */
            --card-bg: #161616;    /* خلفية الكروت رمادي غامق جداً */
            --main-yellow: #ffcc00; /* أصفر روبلوكس الذهبي */
            --dark-yellow: #cca300;
            --text-color: #ffffff;
            --sub-text: #aaaaaa;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* --- قسم البانر العلوي --- */
        .header-banner {
            width: 100%;
            display: flex;
            justify-content: center;
            padding: 30px 0;
            background: linear-gradient(to bottom, #1a1a1a, #0b0b0b);
        }

        .header-banner img {
            max-width: 85%; /* طول الصورة متناسق */
            height: auto;
            border-radius: 10px;
        }

        h1 {
            color: var(--main-yellow);
            margin-top: 20px;
            text-shadow: 0 0 15px rgba(255, 204, 0, 0.3);
        }

        /* --- حاوية الأغراض --- */
        .container {
            display: flex;
            justify-content: center;
            gap: 30px;
            flex-wrap: wrap;
            padding: 50px 20px;
            max-width: 1200px;
        }

        /* --- تصميم كرت الغرض --- */
        .card {
            background-color: var(--card-bg);
            border-radius: 20px;
            width: 260px;
            padding: 30px 20px;
            text-align: center;
            position: relative;
            transition: 0.4s;
            border: 1px solid #222;
            margin-top: 40px;
        }

        .card:hover {
            transform: translateY(-10px);
            border-color: var(--main-yellow);
            box-shadow: 0 10px 30px rgba(255, 204, 0, 0.2);
        }

        /* الأيقونة الدائرية */
        .icon-box {
            width: 90px;
            height: 90px;
            background: linear-gradient(135deg, var(--main-yellow), var(--dark-yellow));
            border-radius: 50%;
            position: absolute;
            top: -45px;
            left: 50%;
