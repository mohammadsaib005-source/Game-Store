<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>متجر ألعاب | Roblox Editions</title>
    <style>
        /* --- الألوان والمتغيرات الأساسية --- */
        :root {
            --bg-color: #121212; /* خلفية داكنة جداً (Black/Very Dark Grey) */
            --card-bg: #1e1e1e;   /* خلفية الكروت (Lighter Dark Grey) */
            --main-yellow: #ffeb3b; /* اللون الأصفر الأساسي (Bright Yellow) */
            --dark-yellow: #fbc02d; /* أصفر أغمق للتدرج (Darker Yellow) */
            --text-color: #ffffff;
            --sub-text: #b0b0b0;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 {
            color: var(--main-yellow);
            text-transform: uppercase;
            margin-bottom: 40px;
            text-shadow: 0 0 10px rgba(255, 235, 59, 0.5); /* تأثير إضاءة */
        }

        /* --- حاوية الكروت --- */
        .container {
            display: flex;
            justify-content: center;
            gap: 25px;
            flex-wrap: wrap;
            max-width: 1200px;
        }

        /* --- تصميم الكرت الأساسي (مستوحى من الصورة) --- */
        .card {
            background-color: var(--card-bg);
            border-radius: 20px;
            width: 280px;
            padding: 25px;
            text-align: center;
            position: relative; /* مهم لتحديد مكان الأيقونة */
            transition: all 0.3s ease;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
            border: 2px solid transparent; /* إطار شفاف في البداية */
        }

        /* تأثير عند تمرير الماوس */
        .card:hover {
            transform: translateY(-10px);
            border-color: var(--main-yellow); /* الإطار يصير أصفر */
            box-shadow: 0 10px 25px rgba(255, 235, 59, 0.3); /* إضاءة صفراء خلفية */
        }

        /* --- تصميم الأيقونة الدائرية --- */
        .icon-container {
            width: 100px;
            height: 100px;
            background: linear-gradient(135deg, var(--main-yellow), var(--dark-yellow));
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            position: absolute;
            top: -50px; /* تطلع برة الكرت فوق */
            left: 50%;
            transform: translateX(-50%);
            box-shadow: 0 5px 10px rgba(0,0,0,0.5);
            border: 4px solid var(--card-bg); /* إطار يفصلها عن الكرت */
        }

        .icon-container img {
            width: 60px;
            height: 60px;
            object-fit: contain;
        }

        /* --- نصوص الكرت --- */
        h2 {
            margin-top: 60px; /* مسافة للأيقونة */
            font-size: 1.4rem;
            color: var(--text-color);
        }

        .price {
            font-size: 2rem;
            font-weight: bold;
            color: var(--main-yellow); /* السعر باللون الأصفر */
            margin: 15px 0;
        }

        .description {
            color: var(--sub-text);
            font-size: 0.9rem;
            margin-bottom: 20px;
        }

        /* --- تصميم زر الشراء --- */
        .buy-btn {
            background: linear-gradient(90deg, var(--dark-yellow), var(--main-yellow));
            color: #000; /* نص أسود على الأصفر */
            border: none;
            padding: 12px 25px;
            border-radius: 25px;
            font-weight: bold;
            font-size: 1.1rem;
            cursor: pointer;
            width: 100%;
            transition: background 0.3s ease;
            box-shadow: 0 3px 6px rgba(0,0,0,0.2);
        }

        .buy-btn:hover {
            background: linear-gradient(90deg, var(--main-yellow), var(--dark-yellow));
            box-shadow: 0 5px 12px rgba(255, 235, 59, 0.5);
        }

        /* --- الخط الملون في أسفل الكرت (زي الصورة) --- */
        .card-footer-line {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 5px;
            border-radius: 0 0 20px 20px;
            background: linear-gradient(90deg, var(--main-yellow), #ffffff, var(--dark-yellow));
        }

    </style>
</head>
<body>

    <h1>Welcome to My Game Store</h1>

    <div class="container">
        <div class="card">
            <div class="icon-container">
                <img src="https://img.icons8.com/color/100/roblox.png" alt="Roblox Icon">
            </div>
            <h2>تطوير ماب كامل</h2>
            <p class="price">$5</p>
            <p class="description">تصميم، برمجة، وبناء ماب روبلوكس من الصفر.</p>
            <button class="buy-btn">Buy with Crypto</button>
            <div class="card-footer-line"></div>
        </div>

        <div class="card">
            <div class="icon-container">
                <img src="https://img.icons8.com/fluency/100/fire-element.png" alt="Blox Fruits Icon">
            </div>
            <h2>Blox Fruits Items</h2>
            <p class="price">$10</p>
            <p class="description">فواكه نادرة وأدوات قوية للعبة Blox Fruits.</p>
            <button class="buy-btn">Buy with Crypto</button>
            <div class="card-footer-line"></div>
        </div>
    </div>

</body>
</html>
