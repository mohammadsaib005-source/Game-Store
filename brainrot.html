<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A7X - STEAL A BRAINROT</title>
    <style>
        body {
            margin: 0; padding: 0; background: #000; color: white;
            font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; align-items: center;
        }

        /* شريط التنقل العلوي الموحد */
        .top-navbar {
            width: 100%; padding: 15px 5%; background: rgba(0, 0, 0, 0.9);
            border-bottom: 1px solid #222; display: flex; justify-content: space-between; align-items: center;
            box-sizing: border-box; position: sticky; top: 0; z-index: 1000;
        }

        .currency-select {
            background: #111; color: #ffcc00; border: 1px solid #ffcc00;
            padding: 5px 10px; border-radius: 10px; cursor: pointer; outline: none;
        }

        /* عنوان الصفحة والبحث */
        .page-header { margin: 40px 0; text-align: center; width: 100%; }
        .page-title { color: #ffcc00; font-size: 2.5rem; font-weight: bold; margin-bottom: 20px; }
        
        .search-container { width: 90%; max-width: 600px; margin: 0 auto 40px auto; }
        .search-input {
            width: 100%; padding: 15px; background: #111; border: 1px solid #333;
            border-radius: 15px; color: white; text-align: right; outline: none;
        }
        .search-input:focus { border-color: #ffcc00; }

        /* شبكة المنتجات */
        .products-grid {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 25px; width: 90%; max-width: 1200px; padding-bottom: 50px;
        }

        .product-card {
            background: rgba(255, 255, 255, 0.02); border: 1px solid #222;
            border-radius: 20px; padding: 20px; text-align: center; transition: 0.3s;
        }
        .product-card:hover { border-color: #ffcc00; transform: translateY(-5px); }
        .product-card img { width: 150px; height: 150px; object-fit: contain; margin-bottom: 15px; }
        .product-price { font-size: 1.5rem; color: #fff; margin: 10px 0; font-weight: bold; }
        
        .out-of-stock { background: #331111; color: #ff4444; font-size: 0.8rem; padding: 5px 10px; border-radius: 10px; display: inline-block; margin-bottom: 10px; }

        /* قسم آراء العملاء */
        .reviews-section { width: 100%; padding: 60px 5%; background: #0a0414; text-align: center; }
        .reviews-container { display: flex; gap: 20px; overflow-x: auto; padding: 20px 0; justify-content: center; min-height: 100px; }
        .no-reviews { color: #666; font-style: italic; }
    </style>
</head>
<body>

    <nav class="top-navbar">
        <div style="display: flex; gap: 15px; align-items: center;">
            <select class="currency-select" id="currencyChange" onchange="updatePrices()">
                <option value="USD">USD | $</option>
                <option value="SAR">SAR | ر.س</option>
            </select>
            <div style="color: #ffcc00; font-weight: bold;">🛒 0</div>
        </div>
        <div class="page-title" style="margin: 0; font-size: 1.5rem;">A7X STORE</div>
        <a href="index.html" style="color: #ffcc00; text-decoration: none;">← العودة للرئيسية</a>
    </nav>

    <div class="page-header">
        <h1 class="page-title">STEAL A BRAINROT</h1>
        <div class="search-container">
            <input type="text" id="searchInput" class="search-input" placeholder="ابحث عن غرض محدد..." onkeyup="filterProducts()">
        </div>
    </div>

    <div class="products-grid" id="productsGrid">
        <div class="product-card" data-name="griffin" data-usd="150">
            <span class="out-of-stock">غير متوفر ❌</span>
            <img src="image_2026-03-14_034417840-removebg-preview.png" alt="Griffin">
            <h3>Griffin</h3>
            <div class="product-price" data-base-price="150">$150</div>
        </div>

        <div class="product-card" data-name="headless horseman" data-usd="350">
            <span class="out-of-stock">غير متوفر ❌</span>
            <img src="image_2026-03-14_034502958-removebg-preview.png" alt="Headless">
            <h3>Headless Horseman</h3>
            <div class="product-price" data-base-price="350">$350</div>
        </div>

        <div class="product-card" data-name="la supreme combination" data-usd="55">
            <span class="out-of-stock">غير متوفر ❌</span>
            <img src="image_2026-03-14_034642938-removebg-preview.png" alt="Supreme">
            <h3>La Supreme Combination</h3>
            <div class="product-price" data-base-price="55">$55</div>
        </div>

        <div class="product-card" data-name="dragon gingerini" data-usd="90">
            <span class="out-of-stock">غير متوفر ❌</span>
            <img src="image_2026-03-14_034804054-removebg-preview.png" alt="Dragon">
            <h3>Dragon Gingerini</h3>
            <div class="product-price" data-base-price="90">$90</div>
        </div>
    </div>

    <section class="reviews-section">
        <h2 style="color: #ffcc00;">آراء العملاء</h2>
        <div class="reviews-container" id="reviewsContainer">
            <p class="no-reviews">لا توجد تقييمات حالياً لهذا القسم.</p>
        </div>
    </section>

    <script>
        // وظيفة تحويل العملات
        function updatePrices() {
            const currency = document.getElementById('currencyChange').value;
            const prices = document.querySelectorAll('.product-price');
            const rate = 3.75; // سعر صرف الدولار للريال

            prices.forEach(priceTag => {
                const basePrice = parseFloat(priceTag.getAttribute('data-base-price'));
                if (currency === 'SAR') {
                    const converted = (basePrice * rate).toFixed(2);
                    priceTag.innerText = converted + ' ر.س';
                } else {
                    priceTag.innerText = '$' + basePrice;
                }
            });
        }

        // وظيفة البحث عن الأغراض
        function filterProducts() {
            const input = document.getElementById('searchInput').value.toLowerCase();
            const cards = document.querySelectorAll('.product-card');

            cards.forEach(card => {
                const name = card.getAttribute('data-name').toLowerCase();
                if (name.includes(input)) {
                    card.style.display = "block";
                } else {
                    card.style.display = "none";
                }
            });
        }
    </script>
</body>
</html>
