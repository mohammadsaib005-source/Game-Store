<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>منتجات Brainrot</title>
    <style>
        body { background: #0b0b0b; color: white; font-family: sans-serif; margin: 0; }
        .nav { padding: 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #333; }
        .back-btn { color: #ffcc00; text-decoration: none; font-weight: bold; border: 1px solid #ffcc00; padding: 8px 15px; border-radius: 8px; }
        
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 30px; padding: 50px; }
        
        /* كرت المنتج المطور */
        .card {
            background: linear-gradient(145deg, #161616, #0f0f0f);
            border-radius: 25px;
            padding: 30px;
            border: 1px solid #222;
            text-align: center;
            transition: 0.3s ease-in-out;
        }

        .card:hover {
            border-color: #ffcc00;
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .image-box {
            height: 180px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(255,255,255,0.02);
            border-radius: 20px;
            margin-bottom: 20px;
        }

        .image-box img {
            max-width: 90%;
            max-height: 90%;
            filter: drop-shadow(0 5px 15px rgba(0,0,0,0.8));
        }

        .price { color: #ffcc00; font-size: 2rem; font-weight: bold; margin: 15px 0; }
        
        .buy-btn {
            background: #ffcc00;
            color: black;
            border: none;
            padding: 15px;
            width: 100%;
            border-radius: 15px;
            font-weight: bold;
            cursor: pointer;
            font-size: 1.1rem;
        }
        
        #cart-float { position: fixed; bottom: 20px; left: 20px; background: #ffcc00; color: black; padding: 15px 30px; border-radius: 50px; font-weight: bold; box-shadow: 0 10px 20px rgba(0,0,0,0.3); }
    </style>
</head>
<body>

    <div class="nav">
        <a href="index.html" class="back-btn">← الرئيسية</a>
        <h2 style="color: #ffcc00; margin: 0;">STEAL A BRAINROT</h2>
        <div></div>
    </div>

    <div class="grid">
        <div class="card">
            <div class="image-box"><img src="SE.png" alt="Strawberry Elephant"></div>
            <h3>Strawberry Elephant</h3>
            <div class="price">$500</div>
            <button class="buy-btn" onclick="addToCart('Elephant')">أضف للسلة</button>
        </div>

        <div class="card">
            <div class="image-box"><img src="ME.png" alt="Meowl"></div>
            <h3>Meowl</h3>
            <div class="price">$400</div>
            <button class="buy-btn" onclick="addToCart('Meowl')">أضف للسلة</button>
        </div>

        <div class="card">
            <div class="image-box"><img src="SK.png" alt="Skibidi"></div>
            <h3>Skibidi Toilet</h3>
            <div class="price">$300</div>
            <button class="buy-btn" onclick="addToCart('Skibidi')">أضف للسلة</button>
        </div>

        <div class="card">
            <div class="image-box"><img src="DR.png" alt="Dragon"></div>
            <h3>Dragon Cannelloni</h3>
            <div class="price">$60</div>
            <button class="buy-btn" onclick="addToCart('Dragon')">أضف للسلة</button>
        </div>
    </div>

    <div id="cart-float">🛒 السلة: <span id="cart-count">0</span></div>

    <script>
        let count = 0;
        function addToCart(name) {
            count++;
            document.getElementById('cart-count').innerText = count;
            // تأثير بصري بسيط
            const notify = document.createElement('div');
            notify.innerText = "تمت إضافة " + name;
            notify.style.cssText = "position:fixed; top:20px; left:50%; transform:translateX(-50%); background:#ffcc00; color:black; padding:10px 20px; border-radius:10px; font-weight:bold; z-index:1000;";
            document.body.appendChild(notify);
            setTimeout(() => notify.remove(), 2000);
        }
    </script>
</body>
</html>
