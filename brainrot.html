<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>Steal A Brainrot | المتجر</title>
    <style>
        body {
            background: #050505;
            color: white;
            font-family: 'Cairo', sans-serif;
            margin: 0;
            overflow-x: hidden;
        }

        /* إضافة خلفية متدرجة متحركة خلف الكروت */
        .bg-glow {
            position: fixed;
            top: 50%; left: 50%;
            width: 600px; height: 600px;
            background: radial-gradient(circle, rgba(255, 204, 0, 0.05) 0%, transparent 70%);
            transform: translate(-50%, -50%);
            z-index: -1;
        }

        .nav {
            padding: 20px 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #ffcc00;
            background: rgba(0,0,0,0.9);
            backdrop-filter: blur(10px);
        }

        .back-link {
            color: #ffcc00;
            text-decoration: none;
            border: 1px solid #ffcc00;
            padding: 8px 15px;
            border-radius: 8px;
            font-weight: bold;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 40px;
            padding: 60px 10%;
        }

        .card {
            background: #111;
            border-radius: 20px;
            padding: 30px;
            border: 1px solid #222;
            text-align: center;
            transition: 0.4s;
            position: relative;
        }

        .card:hover {
            border-color: #ffcc00;
            transform: translateY(-10px);
            box-shadow: 0 0 30px rgba(255, 204, 0, 0.1);
        }

        .img-box {
            height: 180px;
            background: rgba(255,255,255,0.02);
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 20px;
        }

        .img-box img {
            max-width: 100%;
            max-height: 100%;
            filter: drop-shadow(0 0 10px rgba(0,0,0,0.5));
        }

        .price { color: #ffcc00; font-size: 2rem; font-weight: bold; margin: 15px 0; }
        
        .buy-btn {
            background: #ffcc00;
            color: black;
            border: none;
            padding: 12px;
            width: 100%;
            border-radius: 10px;
            font-weight: bold;
            cursor: pointer;
        }

        #cart-button {
            position: fixed;
            bottom: 20px;
            left: 20px;
            background: #ffcc00;
            color: black;
            padding: 15px 25px;
            border-radius: 50px;
            font-weight: bold;
            box-shadow: 0 5px 20px rgba(0,0,0,0.5);
        }
    </style>
</head>
<body>
    <div class="bg-glow"></div>
    <div class="nav">
        <a href="index.html" class="back-link">← العودة للرئيسية</a>
        <h2 style="color:#ffcc00; margin:0;">STEAL A BRAINROT</h2>
        <div style="width:100px;"></div>
    </div>

    <div class="grid">
        <div class="card"><div class="img-box"><img src="SE"></div><h3>Strawberry Elephant</h3><div class="price">$500</div><button class="buy-btn" onclick="add()">أضف للسلة</button></div>
        <div class="card"><div class="img-box"><img src="ME"></div><h3>Meowl</h3><div class="price">$400</div><button class="buy-btn" onclick="add()">أضف للسلة</button></div>
        <div class="card"><div class="img-box"><img src="SK"></div><h3>Skibidi Toilet</h3><div class="price">$300</div><button class="buy-btn" onclick="add()">أضف للسلة</button></div>
        <div class="card"><div class="img-box"><img src="DR"></div><h3>Dragon Cannelloni</h3><div class="price">$60</div><button class="buy-btn" onclick="add()">أضف للسلة</button></div>
    </div>

    <div id="cart-button">🛒 السلة: <span id="count">0</span></div>

    <script>
        let c = 0;
        function add() { c++; document.getElementById('count').innerText = c; }
    </script>
</body>
</html>
