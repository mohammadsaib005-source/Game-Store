<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>Steal A Brainrot | المتجر</title>
    <style>
        body { background: #050505; color: white; font-family: sans-serif; margin: 0; }
        .nav { padding: 20px 5%; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #ffcc00; background: #000; }
        .back-link { color: #ffcc00; text-decoration: none; border: 1px solid #ffcc00; padding: 8px 15px; border-radius: 8px; }
        
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 40px; padding: 60px 10%; }
        .card { background: #111; border-radius: 20px; padding: 30px; border: 1px solid #222; text-align: center; }
        .img-box { height: 180px; background: rgba(255,255,255,0.02); border-radius: 15px; display: flex; align-items: center; justify-content: center; margin-bottom: 20px; }
        .img-box img { max-width: 100%; max-height: 100%; }
        .price { color: #ffcc00; font-size: 2rem; font-weight: bold; margin: 15px 0; }
        .buy-btn { background: #ffcc00; color: black; border: none; padding: 12px; width: 100%; border-radius: 10px; font-weight: bold; cursor: pointer; }

        /* نافذة السلة الاحترافية */
        .modal-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); justify-content: center; align-items: center; z-index: 2000;
        }
        .modal-box {
            background: #1a1a1a; border: 2px solid #ffcc00; padding: 30px; border-radius: 20px; text-align: center; width: 350px;
        }
        .modal-btns { display: flex; flex-direction: column; gap: 10px; margin-top: 25px; }
        .btn-go { background: #ffcc00; color: black; border: none; padding: 12px; border-radius: 10px; font-weight: bold; cursor: pointer; text-decoration: none; }
        .btn-continue { background: transparent; color: white; border: 1px solid #555; padding: 10px; border-radius: 10px; cursor: pointer; }
    </style>
</head>
<body>

    <div class="nav">
        <a href="index.html" class="back-link">← العودة</a>
        <h2 style="color:#ffcc00; margin:0;">BRAINROT ITEMS</h2>
        <div></div>
    </div>

    <div class="grid">
        <div class="card"><div class="img-box"><img src="SE"></div><h3>Elephant</h3><div class="price">$500</div><button class="buy-btn" onclick="addToCart()">أضف للسلة</button></div>
        <div class="card"><div class="img-box"><img src="ME"></div><h3>Meowl</h3><div class="price">$400</div><button class="buy-btn" onclick="addToCart()">أضف للسلة</button></div>
    </div>

    <div id="cartModal" class="modal-overlay">
        <div class="modal-box">
            <h2 style="color: #ffcc00;">✅ تمت الإضافة!</h2>
            <p>تم إضافة هذا الغرض إلى السلة بنجاح.</p>
            <div class="modal-btns">
                <a href="cart.html" class="btn-go">الذهاب إلى السلة</a>
                <button class="btn-continue" onclick="closeModal()">تكملة التسوق</button>
            </div>
        </div>
    </div>

    <script>
        function addToCart() {
            document.getElementById('cartModal').style.display = 'flex';
        }
        function closeModal() {
            document.getElementById('cartModal').style.display = 'none';
        }
    </script>
</body>
</html>
