        .header { padding: 20px; border-bottom: 2px solid #ffcc00; display: flex; justify-content: space-between; align-items: center; background: #050505; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 30px; padding: 40px 8%; }
        
        /* الكرت */
        .card { 
            background: #0a0a0a; border-radius: 20px; padding: 25px; border: 1px solid #222;

        .img-box img { max-width: 90%; max-height: 90%; }

        .stars { color: #ffcc00; font-size: 0.9rem; margin: 10px 0; }
        .price { color: #ffcc00; font-size: 2rem; font-weight: bold; }
        
        .buy-btn { background: #ffcc00; color: black; border: none; padding: 12px; border-radius: 10px; font-weight: bold; cursor: pointer; width: 100%; margin-top: 10px; transition: 0.3s; }
        .buy-btn:hover { background: white; }
        .btn-disabled { background: #333 !important; color: #777 !important; cursor: not-allowed; }

        /* التذييل */
        .footer-nav { margin: 40px 0; display: flex; justify-content: center; gap: 20px; }
        .nav-link { color: #ffcc00; text-decoration: none; border: 1px solid #333; padding: 10px 20px; border-radius: 15px; transition: 0.3s; }
        .nav-link:hover { border-color: #ffcc00; background: rgba(255, 204, 0, 0.05); }
    </style>
</head>
