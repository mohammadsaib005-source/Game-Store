<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>متجر الأساطير | Brainrot Items</title>
    <style>
        body { background: #050505; color: white; font-family: 'Segoe UI', sans-serif; margin: 0; overflow-x: hidden; }
        
        /* الهيدر */
        .header {
            padding: 20px 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(0,0,0,0.9);
            border-bottom: 2px solid #ffcc00;
            position: sticky;
            top: 0;
            z-index: 1000;
            backdrop-filter: blur(10px);
        }

        .cart-icon-btn {
            background: #ffcc00; color: #000; padding: 10px 20px;
            border-radius: 12px; font-weight: bold; cursor: pointer; border: none;
            box-shadow: 0 0 15px rgba(255, 204, 0, 0.3); transition: 0.3s;
        }
        .cart-icon-btn:hover { transform: scale(1.1); box-shadow: 0 0 25px #ffcc00; }

        /* شبكة المنتجات */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
            gap: 40px;
            padding: 60px 10%;
        }

        /* الكرت الذكي والملمع */
        .card {
            background: #111;
            border: 1px solid #222;
            border-radius: 25px;
            padding: 25px;
            text-align: center;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
            overflow: hidden;
        }

        /* تأثير التكبير واللمعة عند مرور الماوس */
        .card:hover {
            transform: scale(1.08); /* يكبر الكرت */
            border-color: #ffcc00;
            box-shadow: 0 0 40px rgba(255, 204, 0, 0.25); /* توهج ذهبي */
        }

        /* حركة للصورة داخل الكرت */
        .img-box {
            height: 180px;
            background: radial-gradient(circle, #1a1a1a 0%, #000 100%);
            border-radius: 20px;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.3s;
        }
        
        .card:hover .img-box img {
            transform: scale(1.15) rotate(5deg); /* الصورة تكبر وتدور قليلاً */
            filter: drop-shadow(0 0 15px #ffcc00); /* لمعة خلف الصورة */
        }

        .img-box img { 
            max-width: 85%; max-height: 85%; 
            object-fit: contain; 
            transition: 0.4s ease; 
        }

        .price { color: #ffcc00; font-size: 2rem; font-weight: bold; margin: 10px 0; }
        
        .buy-btn {
            background: #ffcc00; color: black; border: none; padding: 15px;
            width: 100%; border-radius: 12px; font-weight: bold; cursor: pointer;
            transition: 0.3s;
        }
        .buy-btn:hover { background: white; letter-spacing: 1px; }

        /* نافذة السلة */
        .modal-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); justify-content: center; align-items: center; z-index: 2000;
        }
        .modal-box {
            background: #1a1a1a; border: 2px solid #ffcc00; padding: 30px; border-radius: 20px; text-align: center; width: 320px;
        }
        .modal-btns { display: flex; flex-direction: column; gap: 10px; margin-top: 25px; }
        .btn-confirm { background: #ffcc00; color: #000; padding: 12px; border-radius: 10px; text-decoration: none; font-weight: bold; }
        .btn-cancel { background: transparent; color: #fff; border: 1px solid #444; padding: 10px; border-radius: 10px; cursor: pointer; }

        /* السلة الجانبية */
        #fullCartView {
            display: none; position: fixed; top: 0; right: 0; width: 350px; height: 100%;
            background: #111; border-left: 2px solid #ffcc00; z-index: 3000; padding: 25px;
            box-shadow: -10px 0 40px rgba(0,0,0,0.8);
        }
    </style>
</head>
<body>

    <div class="header">
        <a href="index.html" style="color:#ffcc00; text-decoration:none; font-weight:bold;">← الرئيسية</a>
        <h2 style="color: #ffcc00; margin: 0; letter-spacing: 2px;">BRAINROT STORE</h2>
        <button class="cart-icon-btn" onclick="toggleCartView()">
            🛒 السلة (<span id="cart-count">0</span>)
        </button>
    </div>

    <div class="grid">
        <div class="card">
            <div class="img-box"><img src="SE"></div>
            <h3>Strawberry Elephant</h3>
            <div class="price">$500</div>
            <button class="buy-btn" onclick="addToCart('Elephant', 500)">أضف للسلة</button>
        </div>

        <div class="card">
            <div class="img-box"><img src="ME"></div>
            <h3>Meowl</h3>
            <div class="price">$400</div>
            <button class="buy-btn" onclick="addToCart('Meowl', 400)">أضف للسلة</button>
        </div>

        <div class="card">
            <div class="img-box"><img src="SK"></div>
            <h3>Skibidi Toilet</h3>
            <div class="price">$300</div>
            <button class="buy-btn" onclick="addToCart('Skibidi', 300)">أضف للسلة</button>
        </div>

        <div class="card">
            <div class="img-box"><img src="DR"></div>
            <h3>Dragon Cannelloni</h3>
            <div class="price">$60</div>
            <button class="buy-btn" onclick="addToCart('Dragon', 60)">أضف للسلة</button>
        </div>
    </div>

    <div id="confirmModal" class="modal-overlay">
        <div class="modal-box">
            <h2 style="color: #ffcc00;">✅ تمت الإضافة!</h2>
            <p>الغرض الآن في سلتك.</p>
            <div class="modal-btns">
                <button class="btn-confirm" onclick="toggleCartView(); closeModal();">فتح السلة</button>
                <button class="btn-cancel" onclick="closeModal()">استمرار التسوق</button>
            </div>
        </div>
    </div>

    <div id="fullCartView">
        <button onclick="toggleCartView()" style="background:none; border:none; color:#ffcc00; cursor:pointer; font-size:1.5rem; float:left;">✕</button>
        <h2 style="border-bottom:1px solid #333; padding-bottom:15px;">قائمة المشتريات</h2>
        <div id="cartItemsList"></div>
        <div style="position: absolute; bottom: 30px; width: 85%;">
            <h3 id="totalPriceDisplay" style="border-top: 1px solid #333; padding-top: 20px;">المجموع: $0</h3>
            <button class="buy-btn" onclick="alert('سيتم تفعيل الدفع قريباً!')">إتمام الطلب</button>
        </div>
    </div>

    <script>
        let cart = [];

        function addToCart(name, price) {
            cart.push({name, price});
            updateUI();
            document.getElementById('confirmModal').style.display = 'flex';
        }

        function closeModal() { document.getElementById('confirmModal').style.display = 'none'; }

        function toggleCartView() {
            const v = document.getElementById('fullCartView');
            v.style.display = (v.style.display === 'block') ? 'none' : 'block';
        }

        function updateUI() {
            document.getElementById('cart-count').innerText = cart.length;
            const list = document.getElementById('cartItemsList');
            let total = 0;
            list.innerHTML = '';
            cart.forEach(item => {
                total += item.price;
                list.innerHTML += `<div style="display:flex; justify-content:space-between; margin:10px 0; background:#222; padding:10px; border-radius:10px;">
                    <span>${item.name}</span><span style="color:#ffcc00;">$${item.price}</span>
                </div>`;
            });
            document.getElementById('totalPriceDisplay').innerText = "المجموع: $" + total;
        }
    </script>
</body>
</html>
