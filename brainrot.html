<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>Steal A Brainrot</title>
    <style>
        body { background: #0b0b0b; color: white; font-family: sans-serif; text-align: center; }
        .nav { padding: 20px; text-align: right; }
        .back-btn { color: #ffcc00; text-decoration: none; border: 1px solid #ffcc00; padding: 10px; border-radius: 5px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; padding: 40px; }
        .card { background: #161616; border-radius: 15px; padding: 20px; border: 1px solid #333; transition: 0.3s; }
        .card:hover { border-color: #ffcc00; }
        .card img { max-width: 100%; height: 150px; object-fit: contain; }
        .price { color: #ffcc00; font-size: 1.5rem; font-weight: bold; }
        .buy-btn { background: #ffcc00; border: none; padding: 10px; width: 100%; border-radius: 10px; cursor: pointer; font-weight: bold; }
        #cart-counter { position: fixed; bottom: 20px; left: 20px; background: #ffcc00; color: black; padding: 15px; border-radius: 50px; font-weight: bold; }
    </style>
</head>
<body>
    <div class="nav"><a href="index.html" class="back-btn">← العودة للرئيسية</a></div>
    <h1 style="color: #ffcc00;">STEAL A BRAINROT</h1>
    
    <div class="grid">
        <div class="card"><img src="SE.png"><h3>Strawberry Elephant</h3><p class="price">$500</p><button class="buy-btn" onclick="add()">أضف للسلة</button></div>
        <div class="card"><img src="ME.png"><h3>Meowl</h3><p class="price">$400</p><button class="buy-btn" onclick="add()">أضف للسلة</button></div>
        <div class="card"><img src="SK.png"><h3>Skibidi Toilet</h3><p class="price">$300</p><button class="buy-btn" onclick="add()">أضف للسلة</button></div>
        <div class="card"><img src="DR.png"><h3>Dragon Cannelloni</h3><p class="price">$60</p><button class="buy-btn" onclick="add()">أضف للسلة</button></div>
    </div>

    <div id="cart-counter">🛒 السلة: <span id="count">0</span></div>

    <script>
        let c = 0;
        function add() { c++; document.getElementById('count').innerText = c; alert("تمت الإضافة!"); }
    </script>
</body>
</html>
