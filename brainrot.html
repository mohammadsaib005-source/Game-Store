<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>A7X STORE | Steal a Brainrot</title>
    <style>
        body { background: #000; color: white; font-family: 'Segoe UI', sans-serif; margin: 0; }
        
        .header {
            padding: 20px 5%; display: flex; justify-content: space-between; align-items: center;
            background: rgba(0,0,0,0.9); border-bottom: 2px solid #ffcc00; position: sticky; top: 0; z-index: 1000;
        }

        .back-link { color: #ffcc00; text-decoration: none; border: 1px solid #ffcc00; padding: 8px 15px; border-radius: 8px; }

        .grid {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 30px; padding: 50px 10%;
        }

        .card {
            background: #0a0a0a; border: 1px solid #222; border-radius: 25px;
            padding: 25px; text-align: center; position: relative; transition: 0.3s;
        }

        /* تنسيق غير المتوفر */
        .sold-out-card { opacity: 0.6; filter: grayscale(0.8); }
        .badge {
            position: absolute; top: 15px; right: 15px; background: #e74c3c;
            color: white; padding: 5px 12px; border-radius: 8px; font-size: 0.8rem; font-weight: bold;
        }

        .img-box { height: 180px; margin-bottom: 15px; display: flex; align-items: center; justify-content: center; }
        .img-box img { max-width: 90%; max-height: 90%; }

        .stars { color: #ffcc00; font-size: 0.9rem; margin: 10px 0; }
        .price { color: #ffcc00; font-size: 1.8rem; font-weight: bold; margin-bottom: 15px; }

        .buy-btn {
            background: #333; color: #777; border: none; padding: 12px;
            width: 100%; border-radius: 10px; font-weight: bold; cursor: not-allowed;
        }
    </style>
</head>
<body>

    <div class="header">
        <a href="index.html" class="back-link">← العودة</a>
        <h2 style="color: #ffcc00; margin: 0;">STEAL A BRAINROT ITEMS</h2>
        <div></div>
    </div>

    <div class="grid">
        <div class="card sold-out-card">
            <span class="badge">غير متوفر ❌</span>
            <div class="img-box"><img src="SE"></div>
            <div class="stars">⭐⭐⭐⭐⭐ (0 تقييم)</div>
            <h3>Strawberry Elephant</h3>
            <div class="price">$500</div>
            <button class="buy-btn" disabled>نفذت الكمية</button>
        </div>

        <div class="card sold-out-card">
            <span class="badge">غير متوفر ❌</span>
            <div class="img-box"><img src="ME"></div>
            <div class="stars">⭐⭐⭐⭐⭐ (0 تقييم)</div>
            <h3>Meowl</h3>
            <div class="price">$400</div>
            <button class="buy-btn" disabled>نفذت الكمية</button>
        </div>

        <div class="card sold-out-card">
            <span class="badge">غير متوفر ❌</span>
            <div class="img-box"><img src="SK"></div>
            <div class="stars">⭐⭐⭐⭐⭐ (0 تقييم)</div>
            <h3>Skibidi Toilet</h3>
            <div class="price">$300</div>
            <button class="buy-btn" disabled>نفذت الكمية</button>
        </div>

        <div class="card sold-out-card">
            <span class="badge">غير متوفر ❌</span>
            <div class="img-box"><img src="DR"></div>
            <div class="stars">⭐⭐⭐⭐⭐ (0 تقييم)</div>
            <h3>Dragon Cannelloni</h3>
            <div class="price">$60</div>
            <button class="buy-btn" disabled>نفذت الكمية</button>
        </div>
    </div>

</body>
</html>
